<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="Paradigm Classes - Teacher Dashboard" name="description" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <title>Teacher Dashboard - Paradigm Classes</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --primary-light: #3b82f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .dashboard-container { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: white; padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); margin-bottom: 2rem; }
        .card-header { font-size: 1.5rem; font-weight: 700; color: var(--primary-color); margin-bottom: 1.5rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0.5rem; }
        .list-group { list-style: none; padding: 0; }
        .list-group-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border: 1px solid var(--gray-200); border-radius: var(--radius-md); margin-bottom: 0.5rem; }
        .test-actions { display: flex; gap: 0.5rem; }
        .table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        .table th, .table td { padding: 0.75rem; border: 1px solid var(--gray-200); text-align: left; }
        .badge { padding: 0.25rem 0.5rem; border-radius: 99px; font-size: 0.8rem; font-weight: 700; }
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef08a; color: #854d0e; }
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; gap: 1rem; }
            .dashboard-container { padding: 6rem 1rem 2rem; }
            .card { padding: 1.5rem 1rem; }
            .list-group-item { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .test-actions { width: 100%; justify-content: flex-start; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html" style="display: flex; align-items: center;"><img alt="Paradigm Classes Logo" class="logo-img" src="images/logo.png" style="height: 40px; width: auto; object-fit: contain; margin-right: 8px;"/></a>
                    <div>
                        <div class="logo-primary">PARADIGM</div>
                        <div class="logo-secondary">TEACHER PORTAL</div>
                    </div>
                </div>
                <div class="nav-links">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="study-notes.html">Notes</a>
                    <a class="nav-link" href="video-lectures.html">Videos</a>
                    <a class="nav-link" href="results.html">Results</a>
                    <a class="nav-link" href="askai.html">Ask AI</a>
                    <a class="nav-link" href="faculty.html">Faculty</a>
                </div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open Menu">☰</button>
                <div class="nav-cta">
                    <button id="logoutBtn" class="btn btn-outline" style="background:#1e3a8a; color:white; border:none; padding: 0.5rem 1rem;">Logout</button>
                </div>
            </div>
            <div class="mobile-menu" id="mobileMenu">
                <a class="mobile-link" href="index.html">Home</a>
                <a class="mobile-link" href="study-notes.html">Notes</a>
                <a class="mobile-link" href="video-lectures.html">Videos</a>
                <a class="mobile-link" href="results.html">Results</a>
                <a class="mobile-link" href="askai.html">Ask AI</a>
                <a class="mobile-link" href="faculty.html">Faculty</a>
            </div>
        </div>
    </nav>
    <div style="margin-top: 80px;"></div>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1 class="section-title" style="margin: 0;">Teacher Dashboard</h1>
        </div>

        <div class="dashboard-grid">
            <!-- Left Column -->
            <div>
                <div class="card">
                    <h2 class="card-header">1. Create New Test</h2>
                    <form id="add-test-form">
                        <div class="form-group">
                            <label>Subject</label>
                            <input class="form-input" id="testSubject" type="text" required placeholder="e.g. Physics - Chapter 1">
                        </div>
                        <div class="form-group">
                            <label>Maximum Marks</label>
                            <input class="form-input" id="testMaxMarks" type="number" required placeholder="e.g. 50">
                        </div>
                        <button type="submit" class="btn btn-primary">Create Test</button>
                    </form>
                </div>

                <div class="card">
                    <h2 class="card-header">My Salary History</h2>
                    <div style="overflow-x: auto;">
                        <table class="table" id="salariesTable" style="min-width: 400px;">
                            <thead>
                                <tr>
                                    <th>Month</th>
                                    <th>Issued On</th>
                                    <th class="text-right" style="text-align: right;">Amount (₹)</th>
                                </tr>
                            </thead>
                            <tbody><!-- Filled by JS --></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <div class="card">
                    <h2 class="card-header">Manage Tests & Marks</h2>
                    <div id="testsList">
                        <!-- Filled by JS -->
                    </div>
                </div>

                <!-- Mark Entry Panel -->
                <div class="card" id="markEntryPanel" style="display: none; border: 2px solid var(--primary-color);">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2 class="card-header" style="border: none; margin: 0;">Feed Marks</h2>
                        <button class="btn btn-outline" id="closeMarkPanel" style="padding: 0.2rem 0.5rem;">✕</button>
                    </div>
                    <p style="margin-bottom: 1rem;" id="markEntrySubject">Subject: -</p>
                    <form id="feed-marks-form">
                        <div style="overflow-x: auto;">
                            <table class="table" id="marksTable" style="min-width: 500px;">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th style="width: 120px;">Obtained</th>
                                    </tr>
                                </thead>
                                <tbody><!-- Filled by JS --></tbody>
                            </table>
                        </div>
                        <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">Save Marks</button>
                    </form>
                </div>

                <!-- Change Password -->
                <div class="card">
                    <h2 class="card-header">Change Password</h2>
                    <form id="change-password-form">
                        <div style="margin-bottom: 1rem;">
                            <label style="display: block; margin-bottom: 0.5rem; font-weight: 500;">New Password</label>
                            <input class="form-input" id="newPassword" type="password" required style="width: 100%; padding: 0.75rem; border: 1px solid var(--gray-300); border-radius: var(--radius-md);">
                        </div>
                        <button type="submit" class="btn btn-primary" style="background:#1e3a8a; color:white; border:none; padding: 0.75rem 1.5rem; border-radius: var(--radius-md);">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/teacher.js"></script>
    <script>
        const mobileMenuToggle = document.getElementById('mobileMenuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        if(mobileMenuToggle && mobileMenu) {
            mobileMenuToggle.addEventListener('click', () => {
                mobileMenu.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
