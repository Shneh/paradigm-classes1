<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="Paradigm Classes - Login" name="description" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <style>
        :root {
            --primary-color: #1e3a8a;
            --primary-light: #3b82f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }
        .auth-section {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            position: relative;
            overflow: hidden;
        }
        /* Decorative background elements */
        .auth-section::before {
            content: '';
            position: absolute;
            top: -10%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            border-radius: 50%;
        }
        .auth-section::after {
            content: '';
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(30,58,138,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0,0,0,0.02);
            padding: 3rem 2.5rem;
            position: relative;
            z-index: 10;
        }
        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header h2 { font-size: 2rem; font-weight: 800; color: var(--primary-color); letter-spacing: -0.025em; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-light); font-size: 1.05rem; }
        
        .form-group { margin-bottom: 1.5rem; }
        .form-label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-dark); font-size: 0.95rem; }
        .form-input { 
            width: 100%; 
            padding: 0.85rem 1rem; 
            border: 2px solid var(--gray-200); 
            border-radius: 10px; 
            font-family: inherit; 
            font-size: 1rem; 
            transition: all 0.2s ease;
            background: #f8fafc;
        }
        .form-input:focus { 
            border-color: var(--primary-light); 
            background: white;
            outline: none; 
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); 
        }
        .form-hint { font-size: 0.8rem; color: #94a3b8; margin-top: 0.4rem; display: block; }
        .auth-btn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(to right, var(--primary-color), var(--primary-light));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.05rem;
            letter-spacing: 0.025em;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
            margin-top: 1rem;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
        .auth-btn:active { transform: translateY(0); }
        .error-message { background: #fef2f2; border-left: 4px solid #dc2626; color: #b91c1c; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; display: none; font-weight: 500; }
        
        @media (max-width: 768px) {
            .auth-section { padding: 2rem 1rem; }
            .auth-card { padding: 2.5rem 1.5rem; border-radius: 16px; }
            .auth-header h2 { font-size: 1.75rem; }
        }
    </style>
    <title>Login - Paradigm Classes</title>
</head>
<body>
    <div style="margin-top: 80px;"></div>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html"></a><img alt="Paradigm Classes Logo" class="logo-img" src="images/logo.png" />
                    <div>
                        <div class="logo-primary">PARADIGM</div>
                        <div class="logo-secondary">CLASSES</div>
                    </div>
                </div>
                <div class="nav-links">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="gallery.html">Gallery</a>
                    <a class="nav-link" href="results.html">Results</a>
                    <a class="nav-link" href="askai.html">Ask AI</a>
                    <a class="nav-link" href="faculty.html">Faculty</a>
                    <a class="nav-link" href="index.html#contact">Contact</a>
                </div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open Menu">☰</button>
                <div class="nav-cta">
                    <a class="btn btn-primary" href="login.html">LOGIN</a>
                </div>
            </div>
            <div class="mobile-menu" id="mobileMenu">
                <a class="mobile-link" href="index.html">Home</a>
                <a class="mobile-link" href="gallery.html">Gallery</a>
                <a class="mobile-link" href="results.html">Results</a>
                <a class="mobile-link" href="askai.html">Ask AI</a>
                <a class="mobile-link" href="faculty.html">Faculty</a>
                <a class="mobile-link" href="index.html#contact">Contact</a>
                <a class="mobile-cta" href="login.html">LOGIN</a>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Sign in to your portal</p>
            </div>
            
            <div id="login-error" class="error-message">
                Invalid credentials or connection error.
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="userId" class="form-label">User ID</label>
                    <input class="form-input" id="userId" placeholder="e.g., t201, s101, or admin" type="text" autocomplete="username" autocapitalize="none" required />
                    <span class="form-hint">Students: 's', Teachers: 't'</span>
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input class="form-input" id="password" placeholder="Enter password" type="password" autocomplete="current-password" required />
                </div>
                
                <button class="auth-btn" type="submit">Unlock Dashboard</button>
            </form>
        </div>
    </section>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="js/db.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Copy mobile menu logic here to keep it simple without needing main.js change if main.js is missing or different
        const mobileMenuToggle = document.getElementById('mobileMenuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        if(mobileMenuToggle && mobileMenu) {
            mobileMenuToggle.addEventListener('click', () => {
                mobileMenu.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
