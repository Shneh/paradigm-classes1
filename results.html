<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="Paradigm Classes - Public Results" name="description" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
    <title>Test Results - Paradigm Classes</title>
    <style>
        :root {
            --primary-color: #1e3a8a;
            --primary-light: #3b82f6;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        body { background-color: #f8fafc; }
        .page-header { background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-light) 100%); color: white; padding: 7rem 2rem 4rem; text-align: center; }
        .page-title { font-size: 3rem; margin-bottom: 1rem; }
        .results-container { padding: 4rem 2rem; max-width: 1100px; margin: 0 auto; min-height: 50vh; }
        .test-card { background: white; padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); margin-bottom: 3rem; }
        .test-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 1.5rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 1rem; }
        @media (max-width: 768px) {
            .results-container { padding: 2rem 1rem; }
            .test-card { padding: 1rem; }
            .page-header { padding: 7rem 1rem 2rem; }
            .page-title { font-size: 2rem; }
        }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { padding: 1rem; border-bottom: 1px solid var(--gray-200); text-align: left; }
        .table th { font-weight: 700; color: var(--primary-color); }
        .rank-col { width: 80px; font-weight: bold; text-align: center; }
        .rank-1 { color: #b8860b; font-size: 1.2rem; } /* Gold */
        .rank-2 { color: #a9a9a9; font-size: 1.1rem; } /* Silver */
        .rank-3 { color: #cd7f32; font-size: 1.1rem; } /* Bronze */
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-wrapper">
                <div class="logo">
                    <a href="index.html"></a><img alt="Paradigm Classes Logo" class="logo-img" src="images/logo.png" />
                    <div>
                        <div class="logo-primary">PARADIGM</div>
                        <div class="logo-secondary">CLASSES</div>
                    </div>
                </div>
                <div class="nav-links">
                    <a class="nav-link" href="index.html">Home</a>
                    <a class="nav-link" href="video-lectures.html">Videos</a>
                    <a class="nav-link" href="gallery.html">Gallery</a>
                    <a class="nav-link" href="results.html" style="color: var(--primary-color); font-weight: 700;">Results</a>
                    <a class="nav-link" href="askai.html">Ask AI</a>
                    <a class="nav-link" href="faculty.html">Faculty</a>
                </div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open Menu">☰</button>
                <div class="nav-cta">
                    <a class="btn btn-primary" href="login.html">LOGIN</a>
                </div>
            </div>
            <div class="mobile-menu" id="mobileMenu">
                <a class="mobile-link" href="index.html">Home</a>
                <a class="mobile-link" href="video-lectures.html">Videos</a>
                <a class="mobile-link" href="gallery.html">Gallery</a>
                <a class="mobile-link" href="results.html">Results</a>
                <a class="mobile-link" href="askai.html">Ask AI</a>
                <a class="mobile-link" href="faculty.html">Faculty</a>
                <a class="mobile-cta" href="login.html">LOGIN</a>
            </div>
        </div>
    </nav>
    <div style="margin-top: 80px;"></div>

    <div class="page-header">
        <h1 class="page-title">Test Results</h1>
        <p>View the top performers and test rankings.</p>
    </div>

    <div class="results-container" id="resultsContainer">
        <!-- Filled by JS -->
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="js/db.js"></script>
    <script src="js/results.js"></script>
    <script>
        const mobileMenuToggle = document.getElementById('mobileMenuToggle');
        const mobileMenu = document.getElementById('mobileMenu');
        if(mobileMenuToggle && mobileMenu) {
            mobileMenuToggle.addEventListener('click', () => {
                mobileMenu.classList.toggle('open');
            });
        }
    </script>
</body>
</html>
